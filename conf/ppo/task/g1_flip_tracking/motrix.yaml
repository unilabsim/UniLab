# @package _global_
_selected_sim_backend: motrix
training:
  task_name: G1FlipTracking
  sim_backend: motrix
  play_steps: 1000
algo:
  num_envs: 1024
  max_iterations: 30000
  save_interval: 500
  obs_groups:
    actor:
      - actor
  algorithm:
    entropy_coef: 0.005
reward:
  scales:
    motion_global_root_pos: 1.0
    motion_global_root_ori: 0.5
    motion_body_pos: 1.0
    motion_body_ori: 1.0
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_joint_pos: 0.0
    motion_joint_vel: 0.0
    action_rate_l2: -0.05
    joint_limit: -10.0
  std_root_pos: 0.3
  std_root_ori: 0.4
  std_body_pos: 0.3
  std_body_ori: 0.4
  std_body_lin_vel: 1.0
  std_body_ang_vel: 3.14
  std_joint_pos: 0.2
  std_joint_vel: 1.0
