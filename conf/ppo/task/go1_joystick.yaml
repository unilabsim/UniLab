# @package _global_
defaults:
  - override /reward: go1_ppo_mujoco

training:
  task_name: Go1JoystickFlatTerrain
algo:
  max_iterations: 151
  obs_groups:
    default:
      - policy
    actor:
      - actor
motrix_legacy:
  enabled: true
  algo_overrides:
    max_iterations: 151
    empirical_normalization: true
    policy:
      init_noise_std: 0.5
    algorithm:
      learning_rate: 3.0e-4
      entropy_coef: 1.0e-3
  env_cfg_override:
    legacy_motrix_profile:
      enabled: true
      command_vel_limit:
        - [0.5, 0.0, 0.0]
        - [0.5, 0.0, 0.0]
    reward_config:
      scales:
        tracking_lin_vel: 1.0
        tracking_ang_vel: 0.2
        lin_vel_z: -5.0
        ang_vel_xy: -0.1
        base_height: -100.0
        action_rate: -0.005
        similar_to_default: -0.1
      tracking_sigma: 0.25
      base_height_target: 0.3
