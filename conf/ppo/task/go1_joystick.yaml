# @package _global_
defaults:
  - /reward@reward_motrix: go1_ppo_motrix
  - override /reward: go1_ppo_mujoco

training:
  task_name: Go1JoystickFlatTerrain
algo:
  max_iterations: 151
  empirical_normalization: true
  obs_groups:
    default:
      - policy
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3
backend_profile:
  commands:
    vel_limit:
      - [0.5, 0.0, 0.0]
      - [0.5, 0.0, 0.0]
