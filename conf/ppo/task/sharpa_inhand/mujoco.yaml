# @package _global_
training:
  task_name: SharpaInhandRotation
  sim_backend: mujoco
  render_spacing: 0.5
  cam_distance: 1.5
  cam_lookat: [0.75, 0.75, 0.4]
  cam_elevation: -20.0
algo:
  num_envs: 16384
  num_steps_per_env: 8
  max_iterations: 301
  empirical_normalization: true
  policy:
    actor_hidden_dims: [512, 256, 128]
    critic_hidden_dims: [512, 256, 128]
  algorithm:
    value_loss_coef: 4.0
    entropy_coef: 0.01
    learning_rate: 0.001
    desired_kl: 0.02
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
  save_interval: 50
reward:
  scales:
    rotate: 2.5
    obj_linvel: -0.3
    pose_diff: -0.4
    torque: -0.1
    work: -0.5
    object_pos: 0.003
  angvel_clip_min: -0.5
  angvel_clip_max: 0.5
env:
  zero_action_test_mode: false
  clip_obs: 5.0
  clip_actions: 1.0
  reset_height_lower: 0.59906 # assume the hand base height is 0.5
  reset_height_upper: 0.63906
  reset_angle_diff: 0.7853981633974483
  rot_axis: [0.0, 0.0, 1.0]
  grasp_cache_path: cache/sharpa_grasp_linspace
  sensor:
    tactile_force_sensor_names:
      - contact_right_thumb_elastomer_force
      - contact_right_index_elastomer_force
      - contact_right_middle_elastomer_force
      - contact_right_ring_elastomer_force
      - contact_right_pinky_elastomer_force
  disable_tactile_ids: []
  use_default_object_pose_for_object_pos_anchor: false
  obs:
    observation_mode: flattened # non-hora setting
    enable_tactile: true
    binary_contact: false
    enable_contact_pos: false
    contact_smooth: 0.5
    contact_threshold: 0.05
    tactile_force_clip_max: 4.0
  priv_info:
    include_friction_scale: true
    include_gravity_direction: false
  control_config:
    action_scale: 0.041666666666666664
    p_gain: 1.0 # use the XML value instead of this value by default
    d_gain: 0.1
    torque_control: false # can only be false
    dof_limits_scale: 0.9 # tighten the XML dof limits
  domain_rand:
    scale_list: [0.8, 0.9, 1.0, 1.1, 1.2, 1.3, 1.4, 1.5, 1.6] # cylinder object scales
    randomize_gravity_direction: true
    gravity_direction_magnitude: 9.81
    randomize_pd_gains: true
    randomize_p_gain_scale_lower: 0.5
    randomize_p_gain_scale_upper: 2.0
    randomize_d_gain_scale_lower: 0.5
    randomize_d_gain_scale_upper: 2.0
    randomize_friction: true
    randomize_friction_scale_lower: 0.75
    randomize_friction_scale_upper: 1.25
    elastomer_base_friction: 2.0
    metal_base_friction: 1.0
    object_base_friction: 2.0
    randomize_com: true
    randomize_com_lower: -0.01
    randomize_com_upper: 0.01
    randomize_mass: true
    randomize_mass_lower: 0.01
    randomize_mass_upper: 0.25
    force_scale: 2.0
    random_force_prob_scalar: 0.25
    force_decay: 0.9
    force_decay_interval: 0.08
    joint_noise_scale: 0.02
    contact_latency: 0.005
    contact_sensor_noise: 0.01
