# @package _global_
defaults:
  - /task/sharpa_inhand/mujoco
  - _self_

algo:
  algo_log_name: hora_ppo
  obs_groups:
    actor: [actor]
    critic: [actor]
  actor:
    class_name: unilab.algos.torch.hora:HoraActorModel
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
    priv_info_embed_dim: 9
    priv_mlp_hidden_dims: [256, 128, 9]
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 1.0
      std_type: scalar
  critic:
    class_name: unilab.algos.torch.hora:HoraCriticModel
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
    priv_info_embed_dim: 9
    priv_mlp_hidden_dims: [256, 128, 9]
  algorithm:
    class_name: unilab.algos.torch.hora:HoraPPO

env:
  observation_mode: separated
  critic_info_dim: 12
