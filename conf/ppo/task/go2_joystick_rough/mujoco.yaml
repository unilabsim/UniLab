# @package _global_
training:
  task_name: Go2JoystickRough
  sim_backend: mujoco
algo:
  num_envs: 1024
  max_iterations: 2000
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3
env:
  terrain_generator:
    seed: 42
    curriculum: false
    size: [8.0, 8.0]
    num_rows: 10
    num_cols: 20
    border_width: 20.0
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -100.0
    action_rate: -0.005
    similar_to_default: -0.1
    contact: 0.24
    swing_feet_z: 4.0
  tracking_sigma: 0.25
  base_height_target: 0.3
