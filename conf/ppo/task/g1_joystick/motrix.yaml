# @package _global_
training:
  task_name: G1JoystickFlatTerrain
  sim_backend: motrix
algo:
  num_envs: 2048
  max_iterations: 151
  empirical_normalization: true
  obs_groups:
    actor:
      - policy
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 5.0e-3
env:
  iterations: 3
  domain_rand:
    randomize_kp: false
    randomize_kd: false
  control_config:
    action_scale: 0.5
  commands:
    vel_limit:
      - [0.45, 0.0, 0.0]
      - [0.55, 0.0, 0.0]
  gait_phase_init_mode: independent
  reset_base_qvel_limit: 0.05
reward:
  scales:
    tracking_lin_vel: 3.0
    tracking_ang_vel: 0.25
    forward_progress: 1.5
    under_speed: -1.0
    upper_body_pose: -0.05
    feet_phase: 0.5
    lin_vel_z: -1.0
    ang_vel_xy: -0.2
    base_height: -120.0
    orientation: -2.5
    action_rate: -0.005
    pose: -0.05
  tracking_sigma: 0.25
  gait_frequency: 1.5
  feet_phase_swing_height: 0.09
  feet_phase_tracking_sigma: 0.008
  base_height_target: 0.754
  min_base_height: 0.5
  max_tilt_deg: 35.0
