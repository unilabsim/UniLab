# @package _global_
defaults:
  - /backend_override: motrix
  - _self_

training:
  task_name: G1JoystickFlatTerrain
  sim_backend: motrix
algo:
  num_envs: 2048
env:
  iterations: 3
  commands:
    vel_limit:
      - [0.45, 0.0, 0.0]
      - [0.55, 0.0, 0.0]
  gait_phase_init_mode: independent
  reset_base_qvel_limit: 0.05
