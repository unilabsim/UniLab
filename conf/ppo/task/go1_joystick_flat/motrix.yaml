# @package _global_
training:
  task_name: Go1JoystickFlat
  sim_backend: motrix
  play_steps: 500
  play_env_num: 16
  cam_tracking: true
  cam_tracking_env_idx: 0
  cam_tracking_extra_envs: 9

interactive:
  action_mode: policy
  policy_obs_mode: auto
  camera_follow_body: true
  use_env_visual_model: false
  
algo:
  num_envs: 1024
  max_iterations: 151
  obs_groups:
    actor:
      - actor
  empirical_normalization: true
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3
env:
  commands:
    vel_limit:
      - [0.5, 0.0, 0.0]
      - [0.5, 0.0, 0.0]
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -100.0
    action_rate: -0.005
    similar_to_default: -0.1
    swing_feet_z: 4.0
  tracking_sigma: 0.25
  base_height_target: 0.3
