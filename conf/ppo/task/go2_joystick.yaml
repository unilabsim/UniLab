# @package _global_
defaults:
  - /reward@reward_motrix: go2_ppo_motrix
  - override /reward: go2_ppo_mujoco

training:
  task_name: Go2JoystickFlatTerrain
algo:
  num_envs: 1024
  max_iterations: 151
  empirical_normalization: true
  obs_groups:
    default:
      - policy
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3
motrix_legacy:
  enabled: true
  env_cfg_override:
    legacy_motrix_profile:
      enabled: true
      command_vel_limit:
        - [0.5, 0.0, 0.0]
        - [0.5, 0.0, 0.0]
    domain_rand:
      randomize_kp: false
      randomize_kd: false
