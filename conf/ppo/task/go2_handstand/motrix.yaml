# @package _global_
training:
  task_name: Go2HandStand
  sim_backend: motrix
algo:
  num_envs: 1024
  max_iterations: 3000
  policy:
    init_noise_std: 0.5
  algorithm:
    entropy_coef: 0.005
  obs_groups:
    actor:
      - actor
    critic:
      - critic
reward:
  scales:
    contact: -0.5
    height: 1.0
    oritentation: 1.0
    pose: -0.3
    penalty_contact: -0.2
    action_rate: -0.01
    tar: 0.3
    feet_air_time: 1.0
    world_z_vel_penalty: -1.0
  tracking_sigma: 0.25
  base_height_target: 0.3
env:
  domain_rand:
      randomize_kp: false
      randomize_kd: false
