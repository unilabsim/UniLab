# @package _global_
training:
  task_name: Go2FootStand
  sim_backend: mujoco
env:
  sim_dt: 0.004
  obs_history_len: 15
  control_config:
    action_scale: 0.3
algo:
  empirical_normalization: true
  num_envs: 4096  # 1024
  max_iterations: 3000
  obs_groups:
    actor:
      - actor
    critic:
      - critic
  policy:
    init_noise_std: 0.5
  algorithm:
    entropy_coef: 0.005
reward:
  scales:
    height: 2.0
    orientation: 2.0
    contact: -1.0
    action_rate: -0.01
    termination: -2.0
    dof_pos_limits: -0.5
    torques: 0.0
    pose: -0.1
    penalty_contact: -0.2
    tar: 0.3
    stay_still: -0.1
    energy: 0.0
    dof_acc: 0.0
  tracking_sigma: 0.25
  base_height_target: 0.3
