# @package _global_
defaults:
  - /reward@reward_motrix: g1_ppo_motrix
  - override /reward: g1_ppo_mujoco

training:
  task_name: G1JoystickFlatTerrain
algo:
  num_envs: 2048
  max_iterations: 151
  empirical_normalization: true
  obs_groups:
    default:
      - policy
    actor:
      - policy
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 5.0e-3
backend_profile:
  control_config:
    action_scale: 0.5
  commands:
    vel_limit:
      - [0.45, 0.0, 0.0]
      - [0.55, 0.0, 0.0]
  gait_phase_init_mode: independent
  reset_base_qvel_limit: 0.05
