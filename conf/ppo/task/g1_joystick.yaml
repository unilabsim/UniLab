# @package _global_
defaults:
  - override /reward: g1_ppo_mujoco

training:
  task_name: G1JoystickFlatTerrain
algo:
  num_envs: 2048
  max_iterations: 220
  obs_groups:
    default:
      - policy
    actor:
      - actor
motrix_legacy:
  enabled: true
  algo_overrides:
    max_iterations: 151
    empirical_normalization: true
    obs_groups:
      actor:
        - policy
    policy:
      init_noise_std: 0.5
    algorithm:
      learning_rate: 3.0e-4
      entropy_coef: 5.0e-3
  env_cfg_override:
    iterations: 3
    reward_config:
      scales:
        tracking_lin_vel: 3.0
        tracking_ang_vel: 0.25
        forward_progress: 1.5
        under_speed: -1.0
        upper_body_pose: -0.05
        feet_phase: 0.5
        lin_vel_z: -1.0
        ang_vel_xy: -0.2
        base_height: -120.0
        orientation: -2.5
        action_rate: -0.005
        pose: -0.05
      tracking_sigma: 0.25
      gait_frequency: 1.5
      feet_phase_swing_height: 0.09
      feet_phase_tracking_sigma: 0.008
      base_height_target: 0.754
      min_base_height: 0.5
      max_tilt_deg: 35.0
    backend_overrides:
      enabled: true
      control_action_scale: 0.5
      command_vel_limit:
        - [0.45, 0.0, 0.0]
        - [0.55, 0.0, 0.0]
      gait_phase_init_mode: independent
      reset_base_qvel_limit: 0.05
      reward_scale_overrides:
        under_speed: -1.0
        upper_body_pose: -0.05
        tracking_ang_vel: 0.25
