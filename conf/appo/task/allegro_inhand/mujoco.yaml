# @package _global_
training:
  task_name: AllegroInhandRotation
  sim_backend: mujoco
algo:
  num_envs: 16384
  steps_per_env: 8
  max_iterations: 501
  algorithm:
    value_loss_coef: 4.0
    desired_kl: 0.02
  actor:
    obs_normalization: true
  critic:
    obs_normalization: true
reward:
  scales:
    rotate: 1.25
    obj_linvel: -0.3
    pose_diff: -0.3
    torque: -0.1
    work: -2.0
    drop: 0.0
  angvel_clip_min: -0.5
  angvel_clip_max: 0.5
  reset_z_threshold: 0.125
