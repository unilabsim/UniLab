# @package _global_
training:
  task_name: Go2JoystickFlat
  sim_backend: motrix
algo:
  num_envs: 512
  steps_per_env: 24
  max_iterations: 180
env:
  sim_dt: 0.015
algorithm:
  num_learning_epochs: 25
  num_mini_batches: 8
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -100.0
    action_rate: -0.005
    similar_to_default: -0.1
    alive: 0.0
    contact: 0.24
    swing_feet_z: 4.0
  tracking_sigma: 0.25
  base_height_target: 0.3
